<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Data Entry</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f4f6f9 0%, #e0e5ec 100%);
            color: #1a1a1a; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }
        .container h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #2c3e50;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dce1e6;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a1a;
            transition: all 0.2s ease;
            background: #fafbfc;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #378ADD;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #1D9E75;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 0.5rem;
        }
        .submit-btn:hover {
            background: #14805d;
        }
        .submit-btn:disabled {
            background: #9bd6c2;
            cursor: not-allowed;
        }
        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .message.success {
            display: block;
            background: #e8f7f2;
            color: #0F6E56;
            border: 1px solid #c2ebd9;
        }
        .message.error {
            display: block;
            background: #FCEBEB;
            color: #A32D2D;
            border: 1px solid #fad2d2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Employee Data Entry</h1>
    <form id="dataForm">
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Jane Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="jane.doe@company.com">
        </div>
        
        <div class="form-group">
            <label for="department">Department</label>
            <select id="department" name="department">
                <option value="">Select Department...</option>
                <option value="Engineering">Engineering</option>
                <option value="Design">Design</option>
                <option value="Marketing">Marketing</option>
                <option value="HR">HR</option>
                <option value="Sales">Sales</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">Additional Notes</label>
            <textarea id="message" name="message" placeholder="Optional notes here..."></textarea>
        </div>
        
        <button type="submit" class="submit-btn" id="submitBtn">Submit to Excel</button>
        <div id="statusMessage" class="message"></div>
    </form>
</div>

<script>
    document.getElementById('dataForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const form = this;
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMessage');
        
        btn.disabled = true;
        btn.textContent = 'Submitting...';
        msg.className = 'message'; // reset
        
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (response.ok) {
                msg.textContent = result.message || 'Success!';
                msg.classList.add('success');
                form.reset();
            } else {
                throw new Error(result.error || 'Server error occurred');
            }
        } catch (error) {
            msg.textContent = error.message;
            msg.classList.add('error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit to Excel';
            
            // hide success message after a few seconds
            if(msg.classList.contains('success')) {
                setTimeout(() => {
                    msg.className = 'message';
                }, 4000);
            }
        }
    });
</script>

</body>
</html>
