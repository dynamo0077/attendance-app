<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal - Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e003a 0%, #0d001a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background elements */
        .blob {
            position: fixed;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #8b5cf6; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #3b82f6; animation-delay: -10s; }
        .blob-3 { top: 40%; left: 60%; width: 40vw; height: 40vw; background: #ec4899; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            z-index: 10;
            position: relative;
            margin-top: 5vh;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        select, input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        
        select:focus, input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        select option {
            background: #1e003a;
            color: white;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(236, 72, 153, 0.6);
        }

        .admin-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
            z-index: 20;
        }
        .admin-link:hover { color: white; }

        /* --- VIEWS --- */
        #loginView { display: block; text-align: center; }
        #calendarView { display: none; }

        /* --- CALENDAR SPECIFICS --- */
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .em-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .month-selector {
            width: 200px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.1); }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }

        /* Day Row */
        .day-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .day-row:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }

        .day-row.weekend {
            opacity: 0.6;
        }

        .day-row.today {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .day-date {
            width: 80px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .day-num { font-size: 1.2rem; font-weight: 800; }
        .day-name { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }

        .toggle-wrap {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        /* Custom Checkbox */
        .custom-cb {
            appearance: none;
            background-color: rgba(0,0,0,0.3);
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .custom-cb::before {
            content: "";
            width: 18px;
            height: 18px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: CanvasText;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-cb:checked::before {
            transform: scale(1);
        }
        
        .custom-cb:checked {
            background-color: #22c55e;
            border-color: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .remark-input {
            flex-grow: 1;
            padding: 10px 14px;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .remark-input:focus {
            background: rgba(0,0,0,0.3);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s;
            z-index: 100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #ef4444; }

    </style>
</head>
<body>

    <a href="/admin" class="admin-link">Admin Portal</a>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        
        <!-- LOGIN VIEW -->
        <div class="card" id="loginView">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Welcome form work</h1>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 30px;">Select your personal profile to view your calendar.</p>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; font-weight:600; font-size:0.9rem; color:rgba(255,255,255,0.8); text-transform:uppercase;">Who are you?</label>
                <select id="employeeSelect">
                    <option value="">Loading employees...</option>
                </select>
            </div>
            
            <button class="btn-primary" onclick="enterCalendar()">Open Calendar</button>
        </div>


        <!-- CALENDAR VIEW -->
        <div class="card" id="calendarView">
            <div class="cal-header">
                <div>
                    <div class="em-title" id="empNameDisplay">John Doe</div>
                    <div style="color:rgba(255,255,255,0.6); font-size:0.9rem;">Personal Attendance Record</div>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <select class="month-selector" id="monthSelect" onchange="loadCalendarData()">
                        <option value="0">January 2026</option>
                        <option value="1">February 2026</option>
                        <option value="2">March 2026</option>
                        <option value="3" selected>April 2026</option>
                        <option value="4">May 2026</option>
                        <option value="5">June 2026</option>
                        <option value="6">July 2026</option>
                        <option value="7">August 2026</option>
                        <option value="8">September 2026</option>
                        <option value="9">October 2026</option>
                        <option value="10">November 2026</option>
                        <option value="11">December 2026</option>
                    </select>
                    <button class="logout-btn" onclick="logoutCalendar()">Log Out</button>
                </div>
            </div>

            <div id="calendarList">
                <div class="loading-text">Loading your records...</div>
            </div>

        </div>

    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toast">Saved Successfully</div>

    <script>
        const YEAR = 2026;
        let EMPLOYEES = [];
        let CURRENT_EMP_ID = null;

        // Auto-select current real month if playing along past April 2026, else stick to selected logic.
        // We'll leave it simple for now and rely on manual month select.

        async function fetchEmployees() {
            try {
                const res = await fetch('/api/employees');
                const json = await res.json();
                const sel = document.getElementById('employeeSelect');
                if (json.success) {
                    EMPLOYEES = json.data;
                    sel.innerHTML = '<option value="">-- Select Your Name --</option>';
                    EMPLOYEES.forEach(emp => {
                        const opt = document.createElement('option');
                        opt.value = emp.id;
                        opt.textContent = `${emp.name} (${emp.email})`;
                        sel.appendChild(opt);
                    });
                } else {
                    sel.innerHTML = '<option value="">Error loading</option>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        function enterCalendar() {
            const sel = document.getElementById('employeeSelect');
            if(!sel.value) { alert("Please select your name."); return; }
            
            CURRENT_EMP_ID = sel.value;
            const emp = EMPLOYEES.find(e => e.id == CURRENT_EMP_ID);
            
            document.getElementById('empNameDisplay').textContent = emp.name;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('calendarView').style.display = 'block';
            
            loadCalendarData();
        }

        function logoutCalendar() {
            CURRENT_EMP_ID = null;
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('calendarView').style.display = 'none';
        }

        function daysInMonth(m) {
            return new Date(YEAR, m + 1, 0).getDate();
        }
        
        function isWeekend(m, d) {
            const dow = new Date(YEAR, m, d).getDay();
            return dow === 0 || dow === 6; // Sunday(0) or Saturday(6)
        }
        
        function isToday(m, d) {
            const now = new Date();
            // Using exact matching for the demo
            return (now.getFullYear() === YEAR && now.getMonth() === Number(m) && now.getDate() === d);
        }

        async function loadCalendarData() {
            const monthIdx = document.getElementById('monthSelect').value;
            const mpad = String(Number(monthIdx)+1).padStart(2,'0');
            const datePrefix = `${YEAR}-${mpad}`;
            
            document.getElementById('calendarList').innerHTML = '<div class="loading-text">Loading your records...</div>';

            try {
                const res = await fetch(`/api/daily?month=${datePrefix}`);
                const json = await res.json();
                
                if(json.success) {
                    // Filter just for this user
                    const myRecords = json.data.filter(r => String(r.employee_id) === String(CURRENT_EMP_ID));
                    buildCalendarIterface(Number(monthIdx), myRecords);
                } else {
                    alert("Failed to load records.");
                }
            } catch(e) {
                console.error(e);
            }
        }

        function buildCalendarIterface(m, records) {
            const days = daysInMonth(m);
            let html = '';

            // Day matching logic
            const dayMap = {};
            records.forEach(r => {
                const dayNum = parseInt(r.date.split('-')[2]);
                dayMap[dayNum] = r;
            });

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            for(let d = 1; d <= days; d++) {
                const rec = dayMap[d];
                const isWe = isWeekend(m, d);
                const isT = isToday(m, d);
                const dowStr = dayNames[new Date(YEAR, m, d).getDay()];
                const dateStr = `${YEAR}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                let classes = 'day-row';
                if(isWe) classes += ' weekend';
                if(isT) classes += ' today';

                let isChecked = rec && rec.present ? 'checked' : '';
                let remarkVal = rec && rec.remark ? rec.remark.replace(/"/g, '&quot;') : '';

                html += `
                    <div class="${classes}">
                        <div class="day-date">
                            <span class="day-num">${String(d).padStart(2,'0')}</span>
                            <span class="day-name">${dowStr} ${isT ? '(Today)' : ''}</span>
                        </div>
                        <div class="toggle-wrap">
                            <input type="checkbox" class="custom-cb" ${isChecked} 
                                onchange="toggleDay('${dateStr}', this.checked)">
                        </div>
                        <input type="text" class="remark-input" placeholder="Add remark..." 
                            value="${remarkVal}" 
                            onblur="saveRemark('${dateStr}', this.value)">
                    </div>
                `;
            }

            document.getElementById('calendarList').innerHTML = html;
        }

        // --- API Calls ---

        async function toggleDay(dateStr, isPresent) {
            try {
                const res = await fetch('/api/daily/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: CURRENT_EMP_ID, date: dateStr, present: isPresent })
                });
                const json = await res.json();
                if(json.success) {
                    showToast('Saved');
                    if(isPresent) {
                        confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 }, colors: ['#22c55e'] });
                    }
                } else {
                    showToast(json.error, true);
                }
            } catch(e) {
                showToast('Network error', true);
            }
        }

        async function saveRemark(dateStr, remarkText) {
            try {
                const res = await fetch('/api/daily/remark', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: CURRENT_EMP_ID, date: dateStr, remark: remarkText })
                });
                const json = await res.json();
                if(json.success) showToast('Remark Saved');
                else showToast(json.error, true);
            } catch(e) {
                showToast('Network error', true);
            }
        }

        // --- Helper ---
        let toastTimeout;
        function showToast(msg, isError=false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = isError ? 'toast error show' : 'toast show';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // Boot
        fetchEmployees();
    </script>
</body>
</html>
