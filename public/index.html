<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance — Submit</title>
  <meta name="description" content="Submit your attendance record securely."/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --green-d: #14805d; --green-l: #e8f7f2;
      --border: #E2E8F0; --bg: #F2F4F8; --text: #1a1a2e; --muted: #64748B;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #0F6E56 0%, #1D9E75 100%);
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 10px rgba(15,110,86,.25);
    }
    .logo { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: -.2px; }
    .logo span { opacity: .65; font-size: 13px; font-weight: 400; margin-left: 8px; }

    /* Main */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      width: 100%; max-width: 480px;
      overflow: hidden;
    }
    .card-header {
      background: var(--green-l);
      border-bottom: 1px solid #c5e8d8;
      padding: 22px 28px 18px;
    }
    .card-header h1 { font-size: 20px; font-weight: 700; color: #0F6E56; }
    .card-header p  { font-size: 13px; color: #3a7d62; margin-top: 4px; }
    .card-body { padding: 24px 28px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    input, select, textarea {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; color: var(--text);
      background: #FAFBFC; outline: none; transition: all .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--green); background: #fff;
      box-shadow: 0 0 0 3px rgba(29,158,117,.1);
    }
    textarea { resize: vertical; min-height: 80px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: 9px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s;
      margin-top: 6px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--green-d); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* Status box */
    .status {
      margin-top: 14px; padding: 13px 16px;
      border-radius: 9px; font-size: 13px;
      display: none; text-align: center; font-weight: 600;
    }
    .status.success { display: block; background: var(--green-l); color: #0F6E56; border: 1px solid #b2dead; }
    .status.error   { display: block; background: #FCEBEB; color: #A32D2D; border: 1px solid #f5b7b7; }

    /* Success screen */
    .success-screen {
      display: none; text-align: center; padding: 36px 28px;
    }
    .success-screen .check { font-size: 52px; }
    .success-screen h2 { font-size: 20px; font-weight: 700; margin: 12px 0 6px; color: #0F6E56; }
    .success-screen p  { font-size: 13px; color: var(--muted); }
    .submit-another { margin-top: 20px; background: none; border: 1.5px solid var(--green); color: var(--green); border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .submit-another:hover { background: var(--green-l); }

    footer {
      text-align: center; padding: 16px;
      font-size: 11px; color: var(--muted);
    }
    @media(max-width:480px){ .row2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <div class="logo">📋 Attendance <span>Public Portal</span></div>
</header>

<main>
  <div class="card">
    <!-- Form view -->
    <div id="formView">
      <div class="card-header">
        <h1>Submit Your Attendance</h1>
        <p>Fill in your details below. Your information is stored securely.</p>
      </div>
      <div class="card-body">
        <form id="attendForm" novalidate>
          <div class="row2">
            <div class="form-group">
              <label for="name">Full Name *</label>
              <input type="text" id="name" name="name" placeholder="Jane Doe" required autocomplete="name">
            </div>
            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" name="email" placeholder="jane@example.com" required autocomplete="email">
            </div>
          </div>
          <div class="row2">
            <div class="form-group">
              <label for="department">Department</label>
              <select id="department" name="department">
                <option value="">Select…</option>
                <option>Engineering</option>
                <option>Design</option>
                <option>Marketing</option>
                <option>HR</option>
                <option>Sales</option>
              </select>
            </div>
            <div class="form-group">
              <label for="role">Role</label>
              <input type="text" id="role" name="role" placeholder="e.g. Developer">
            </div>
          </div>
          <div class="form-group">
            <label for="phone">Phone (optional)</label>
            <input type="tel" id="phone" name="phone" placeholder="+1 555-0100" autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="notes">Notes (optional)</label>
            <textarea id="notes" name="notes" placeholder="Anything to add…"></textarea>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">Submit Attendance</button>
          <div class="status" id="statusBox"></div>
        </form>
      </div>
    </div>

    <!-- Success view (shown after submit) -->
    <div class="success-screen" id="successView">
      <div class="check">✅</div>
      <h2 id="successName">Attendance Recorded!</h2>
      <p>Your submission has been saved. Thank you.</p>
      <button class="submit-another" onclick="resetForm()">Submit Another</button>
    </div>
  </div>
</main>

<footer>Attendance Portal · Secured · <a href="/admin" style="color:inherit;opacity:.5">Admin</a></footer>

<script>
  document.getElementById('attendForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const box = document.getElementById('statusBox');
    box.className = 'status';
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    const data = {
      name:       document.getElementById('name').value.trim(),
      email:      document.getElementById('email').value.trim(),
      department: document.getElementById('department').value,
      role:       document.getElementById('role').value.trim(),
      phone:      document.getElementById('phone').value.trim(),
      notes:      document.getElementById('notes').value.trim(),
    };

    if (!data.name || !data.email) {
      box.textContent = 'Please fill in your Name and Email.';
      box.className = 'status error';
      btn.disabled = false;
      btn.textContent = 'Submit Attendance';
      return;
    }

    try {
      const res  = await fetch('/api/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      const json = await res.json();
      if (res.ok && json.success) {
        document.getElementById('successName').textContent = `Thank you, ${data.name}!`;
        document.getElementById('formView').style.display = 'none';
        document.getElementById('successView').style.display = 'block';
      } else {
        throw new Error(json.error || 'Submission failed.');
      }
    } catch (err) {
      box.textContent = err.message;
      box.className = 'status error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit Attendance';
    }
  });

  function resetForm() {
    document.getElementById('attendForm').reset();
    document.getElementById('statusBox').className = 'status';
    document.getElementById('formView').style.display = 'block';
    document.getElementById('successView').style.display = 'none';
  }
</script>
</body>
</html>
